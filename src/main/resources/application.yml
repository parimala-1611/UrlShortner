spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: urlshortener
    password: urlshortener
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  retention:
    default-expiry-days: 365
    purge-after-days: 90
    purge-cron: "0 0 3 * * *"
  cors:
    # Comma-separated list of allowed origins, e.g. "http://localhost:5173,http://localhost:3000"
    # Empty by default (secure by default) - no cross-origin requests are allowed until configured.
    allowed-origins: ""
